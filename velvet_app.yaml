spec:
  containers:
    - name: velvet-fb-app
      image: /velvet_fb_demo/wholesale_app/images/velvet_fb_app:latest
      env:
        SNOWFLAKE_ACCOUNT: "{{account}}"
        SNOWFLAKE_USER: "{{user}}"
        SNOWFLAKE_PASSWORD: "{{password}}"
        SNOWFLAKE_WAREHOUSE: "COMPUTE_WH"
        SNOWFLAKE_DATABASE: "VELVET_FB_DEMO"
        SNOWFLAKE_SCHEMA: "WHOLESALE_APP"
        AZURE_SPEECH_KEY: "{{azure_speech_key}}"
        AZURE_SPEECH_REGION: "westeurope"
        PORT: "8080"
      resources:
        requests:
          memory: 2Gi
          cpu: 1000m
        limits:
          memory: 4Gi
          cpu: 2000m
      readinessProbe:
        port: 8080
        path: /api/products
  endpoints:
    - name: velvet-fb-endpoint
      port: 8080
      public: true
  networkPolicyConfig:
    allowInternetEgress: true
  externalAccess:
    - integration: azure_speech_access_integration
    - integration: snowflake_cortex_access
